<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bamberry Lawyers — Homepage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/base.css" />
  <style>
    @keyframes marquee {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    html { scroll-behavior: smooth; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="src/tokens.js?v=2"></script>
  <script type="text/babel" data-presets="react" src="src/shared.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/direction-a.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/direction-b.jsx"></script>

  <script type="text/babel" data-presets="react">
    const { useState: useStateApp, useEffect: useEffectApp } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "#B08A4A",
      "direction": "A"
    }/*EDITMODE-END*/;

    function App() {
      const [accent, setAccentRaw] = useStateApp(TWEAK_DEFAULTS.accent);
      const [direction, setDirectionRaw] = useStateApp(() => {
        try { return localStorage.getItem('bamberry.direction') || TWEAK_DEFAULTS.direction; }
        catch { return TWEAK_DEFAULTS.direction; }
      });

      useEffectApp(() => {
        document.documentElement.style.setProperty('--accent', accent);
      }, [accent]);

      const setAccent = (v) => {
        setAccentRaw(v);
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accent: v } }, '*');
      };
      const setDirection = (v) => {
        setDirectionRaw(v);
        try { localStorage.setItem('bamberry.direction', v); } catch {}
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { direction: v } }, '*');
      };

      return (
        <>
          {/* Floating direction switcher (always visible) */}
          <DirectionSwitcher direction={direction} setDirection={setDirection} />
          {direction === 'A' ? <DirectionA accent={accent} /> : <DirectionB accent={accent} />}
          <TweaksPanel accent={accent} setAccent={setAccent} direction={direction} setDirection={setDirection} />
        </>
      );
    }

    function DirectionSwitcher({ direction, setDirection }) {
      return (
        <div style={{
          position: 'fixed', top: '50%', right: 16, transform: 'translateY(-50%)',
          zIndex: 100, display: 'flex', flexDirection: 'column', gap: 6,
        }}>
          {['A', 'B'].map(d => (
            <button key={d} onClick={() => setDirection(d)} title={d === 'A' ? 'Direction A · The Quiet Room' : 'Direction B · On the Record'}
              style={{
                width: 40, height: 40,
                border: direction === d ? '1px solid var(--accent)' : '1px solid rgba(128,128,128,0.3)',
                background: direction === d ? 'var(--accent)' : 'rgba(255,255,255,0.85)',
                backdropFilter: 'blur(10px)',
                color: direction === d ? '#fff' : 'var(--ink)',
                fontFamily: 'var(--serif)', fontSize: 20, fontStyle: 'italic',
                cursor: 'pointer', transition: 'all .2s',
              }}>{d}</button>
          ))}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
